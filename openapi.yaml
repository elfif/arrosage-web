openapi: 3.0.3
info:
  title: Arrosage API
  description: Simple API for controlling the watering system
  version: 1.0.0
  contact:
    name: Arrosage System
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Development server

paths:
  /:
    get:
      summary: Get API information
      description: Root endpoint with API information and available endpoints
      operationId: getApiInfo
      responses:
        '200':
          description: API information
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Arrosage API"
                  version:
                    type: string
                    example: "1.0.0"
                  endpoints:
                    type: object
                    properties:
                      "GET /mode":
                        type: string
                        example: "Get current mode"
                      "POST /mode":
                        type: string
                        example: "Set new mode"
                      "GET /status":
                        type: string
                        example: "Get current sequence status"
                      "POST /pause":
                        type: string
                        example: "Pause the system"
                      "POST /resume":
                        type: string
                        example: "Resume the system"
                      "POST /reset":
                        type: string
                        example: "Reset the system"
                      "POST /start":
                        type: string
                        example: "Start sequence (SEMI_AUTO mode only)"
                      "POST /relay/open":
                        type: string
                        example: "Open a single relay (MANUAL mode only)"
                      "POST /relay/close":
                        type: string
                        example: "Close all relays (MANUAL mode only)"
                      "GET /relays":
                        type: string
                        example: "Get current per-relay status"
                      "GET /settings":
                        type: string
                        example: "Get current settings"
                      "POST /settings":
                        type: string
                        example: "Update settings"
                      "DELETE /sequence/relay/{relay_id}":
                        type: string
                        example: "Remove a relay from the current sequence run"
                      "GET /history":
                        type: string
                        example: "Paginated list of relay activity history"
                      "GET /history/stats":
                        type: string
                        example: "Aggregate history stats for a month or year"

  /mode:
    get:
      summary: Get current mode
      description: Get the current system mode
      operationId: getCurrentMode
      tags:
        - Mode
      responses:
        '200':
          description: Current mode information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    post:
      summary: Set new mode
      description: Set a new system mode
      operationId: setCurrentMode
      tags:
        - Mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModeRequest'
      responses:
        '200':
          description: Mode set successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        '400':
          description: Invalid mode value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request body validation error (e.g. missing or malformed fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /status:
    get:
      summary: Get current status
      description: Get the current sequence status
      operationId: getCurrentStatus
      tags:
        - Status
      responses:
        '200':
          description: Current status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sequence/relay/{relay_id}:
    delete:
      summary: Remove relay from current sequence
      description: >
        Remove a relay from the currently running sequence. If the relay is
        active, the sequence advances immediately to the next non-removed step.
        If the relay is scheduled later, it is skipped when its turn would come.
        Works while paused; resume then continues from the next surviving relay.
      operationId: removeRelayFromSequence
      tags:
        - Sequence
      parameters:
        - name: relay_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 7
          description: Relay index (0-7) to remove from the current run
      responses:
        '200':
          description: Removal result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SequenceRemoveRelayResponse'
        '409':
          description: No active sequence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid relay_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pause:
    post:
      summary: Pause system
      description: Pause the watering system
      operationId: pauseSystem
      tags:
        - Control
      responses:
        '200':
          description: Pause action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /resume:
    post:
      summary: Resume system
      description: Resume the watering system from pause
      operationId: resumeSystem
      tags:
        - Control
      responses:
        '200':
          description: Resume action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reset:
    post:
      summary: Reset system
      description: Reset the watering system to initial state
      operationId: resetSystem
      tags:
        - Control
      responses:
        '200':
          description: Reset action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /start:
    post:
      summary: Start sequence
      description: Start a watering sequence (only works in SEMI_AUTO mode)
      operationId: startSystem
      tags:
        - Control
      responses:
        '200':
          description: Start action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
              examples:
                success:
                  summary: Successful start
                  value:
                    success: true
                    message: "Sequence started successfully"
                    current_mode: "semi_auto"
                wrongMode:
                  summary: Wrong mode
                  value:
                    success: false
                    message: "Cannot start sequence. System must be in SEMI_AUTO mode (current mode: auto)"
                    current_mode: "auto"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /relay/open:
    post:
      summary: Open a single relay
      description: Open the specified relay (only works in MANUAL mode). Any previously opened relay is closed first.
      operationId: openRelay
      tags:
        - Relay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelayOpenRequest'
      responses:
        '200':
          description: Relay open action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelayStatusResponse'
              examples:
                success:
                  summary: Relay opened successfully
                  value:
                    success: true
                    message: "Relay 2 opened successfully"
                    current_mode: "manual"
                    relays:
                      - { relay_id: 0, is_open: false }
                      - { relay_id: 1, is_open: false }
                      - { relay_id: 2, is_open: true }
                      - { relay_id: 3, is_open: false }
                      - { relay_id: 4, is_open: false }
                      - { relay_id: 5, is_open: false }
                      - { relay_id: 6, is_open: false }
                      - { relay_id: 7, is_open: false }
                wrongMode:
                  summary: Wrong mode
                  value:
                    success: false
                    message: "Cannot open relay. System must be in MANUAL mode (current mode: auto)"
                    current_mode: "auto"
                    relays:
                      - { relay_id: 0, is_open: false }
                      - { relay_id: 1, is_open: false }
                      - { relay_id: 2, is_open: false }
                      - { relay_id: 3, is_open: false }
                      - { relay_id: 4, is_open: false }
                      - { relay_id: 5, is_open: false }
                      - { relay_id: 6, is_open: false }
                      - { relay_id: 7, is_open: false }
        '400':
          description: Invalid relay_id (must be an integer between 0 and 7)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidId:
                  summary: Invalid relay_id
                  value:
                    detail: "Invalid relay_id '8'. Must be an integer between 0 and 7."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /relay/close:
    post:
      summary: Close all relays
      description: Close all relays (only works in MANUAL mode).
      operationId: closeRelays
      tags:
        - Relay
      responses:
        '200':
          description: Relay close action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelayStatusResponse'
              examples:
                success:
                  summary: All relays closed
                  value:
                    success: true
                    message: "All relays closed successfully"
                    current_mode: "manual"
                    relays:
                      - { relay_id: 0, is_open: false }
                      - { relay_id: 1, is_open: false }
                      - { relay_id: 2, is_open: false }
                      - { relay_id: 3, is_open: false }
                      - { relay_id: 4, is_open: false }
                      - { relay_id: 5, is_open: false }
                      - { relay_id: 6, is_open: false }
                      - { relay_id: 7, is_open: false }
                wrongMode:
                  summary: Wrong mode
                  value:
                    success: false
                    message: "Cannot close relays. System must be in MANUAL mode (current mode: auto)"
                    current_mode: "auto"
                    relays:
                      - { relay_id: 0, is_open: false }
                      - { relay_id: 1, is_open: false }
                      - { relay_id: 2, is_open: false }
                      - { relay_id: 3, is_open: false }
                      - { relay_id: 4, is_open: false }
                      - { relay_id: 5, is_open: false }
                      - { relay_id: 6, is_open: false }
                      - { relay_id: 7, is_open: false }
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /relays:
    get:
      summary: Get current relay status
      description: Return the per-relay open/closed status. Works in any mode. State is derived from the system status (at most one relay is open at a time).
      operationId: getRelaysStatus
      tags:
        - Relay
      responses:
        '200':
          description: Current per-relay status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelayStatusResponse'
              examples:
                success:
                  summary: One relay currently open
                  value:
                    success: true
                    message: "Current relay status"
                    current_mode: "manual"
                    relays:
                      - { relay_id: 0, is_open: false }
                      - { relay_id: 1, is_open: false }
                      - { relay_id: 2, is_open: true }
                      - { relay_id: 3, is_open: false }
                      - { relay_id: 4, is_open: false }
                      - { relay_id: 5, is_open: false }
                      - { relay_id: 6, is_open: false }
                      - { relay_id: 7, is_open: false }
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /settings:
    get:
      summary: Get current settings
      description: Get the current system settings including sequence durations, schedule, and start time
      operationId: getCurrentSettings
      tags:
        - Settings
      responses:
        '200':
          description: Current settings information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '404':
          description: Settings not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    post:
      summary: Update settings
      description: Update the system settings with validation
      operationId: updateSettings
      tags:
        - Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsRequest'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /history:
    get:
      summary: List relay activity history
      description: |
        Paginated list of relay activity records (one row per relay
        open/close cycle), sorted newest first. Each record captures
        which relay was opened, when (unix epoch seconds, UTC), how long
        it stayed open, and the mode the system was in.
      operationId: getHistory
      tags:
        - History
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number, 1-indexed
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          description: Items per page (max 500)
        - in: query
          name: relay_id
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 7
          description: Optional filter by relay id (0-7)
        - in: query
          name: start
          required: false
          schema:
            type: integer
            minimum: 0
          description: Inclusive lower bound on opened_at (unix seconds)
        - in: query
          name: end
          required: false
          schema:
            type: integer
            minimum: 0
          description: Exclusive upper bound on opened_at (unix seconds)
      responses:
        '200':
          description: Paginated history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryListResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /history/stats:
    get:
      summary: Aggregate history stats
      description: |
        Total relay-open duration and per-relay breakdown for a given
        month or year. Period boundaries are resolved in the Pi's local
        timezone (so "April" means the whole local calendar month).
        `per_relay` always includes all 8 relays (zero-filled when
        inactive).
      operationId: getHistoryStats
      tags:
        - History
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            enum: [month, year]
          description: Aggregation period
        - in: query
          name: year
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
          description: 4-digit year
        - in: query
          name: month
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Month 1-12 (required when period=month)
      responses:
        '200':
          description: Aggregate statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryStatsResponse'
        '422':
          description: Validation error (invalid period, year, month, or missing month)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /network/status:
    get:
      tags:
        - Network
      summary: Get current LAN/AP state
      description: |
        Returns the live state of Ethernet and Wi-Fi-STA (from a short
        nmcli probe) combined with the watchdog's view of the AP
        (``mode``, ``lan_last_ok_at``, ``ap_active_since``) read from
        Redis.
      operationId: getNetworkStatus
      responses:
        '200':
          description: Current network state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkStatusResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /network/force:
    post:
      tags:
        - Network
      summary: Force the watchdog into 'ap' or 'auto'
      description: |
        Writes a one-shot intent consumed by the watchdog on its next
        iteration. ``ap`` forces the AP up; ``auto`` releases the
        override so the normal state machine resumes.
      operationId: forceNetworkMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NetworkForceRequest'
      responses:
        '202':
          description: Intent accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkForceResponse'
        '400':
          description: Invalid target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /network/wifi:
    get:
      tags:
        - Network
      summary: Get the configured Wi-Fi client profile
      description: Returns the SSID and security of the single WPA2-PSK client profile, or ``configured=false`` if none. The PSK is never returned.
      operationId: getNetworkWifi
      responses:
        '200':
          description: Current Wi-Fi client profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WifiProfileResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Network
      summary: Create or replace the Wi-Fi client profile
      description: |
        Creates (or replaces) the single Wi-Fi client profile. Only
        WPA2-PSK is supported; PSK length must be between 8 and 63
        characters. Bumps ``network:wifi_changed`` so the watchdog can
        bring the AP down for the new profile to associate.
      operationId: putNetworkWifi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WifiProfileRequest'
      responses:
        '200':
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WifiProfileResponse'
        '400':
          description: Validation error (unsupported security, bad PSK length, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Network
      summary: Remove the Wi-Fi client profile
      description: Idempotent; returns 204 even if no profile was configured.
      operationId: deleteNetworkWifi
      responses:
        '204':
          description: Profile removed (or was already absent)
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ModeRequest:
      type: object
      required:
        - mode
      properties:
        mode:
          type: string
          enum: [manual, auto, semi_auto, pause]
          description: The mode to set
          example: "auto"

    ModeResponse:
      type: object
      required:
        - current
        - valid_modes
      properties:
        current:
          type: string
          enum: [manual, auto, semi_auto, pause]
          description: Current system mode
          example: "auto"
        valid_modes:
          type: array
          items:
            type: string
            enum: [manual, auto, semi_auto, pause]
          description: List of all valid modes
          example: ["manual", "auto", "semi_auto", "pause"]

    StatusResponse:
      type: object
      required:
        - status
        - has_active_sequence
        - skipped_relays
      properties:
        status:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/SequenceStatus'
          description: Current sequence status or null if no active sequence
        has_active_sequence:
          type: boolean
          description: Whether there is an active sequence running
          example: true
        skipped_relays:
          type: array
          description: >
            Relay indices skipped for the remainder of the current run
            (same as status.skipped_relays when present); empty when idle
          items:
            type: integer
            minimum: 0
            maximum: 7
          example: [0, 3]

    SequenceRemoveRelayResponse:
      type: object
      required:
        - success
        - reason
        - current_mode
        - opened_relay
        - skipped_relays
      properties:
        success:
          type: boolean
          example: true
        reason:
          type: string
          description: >
            Result code; ok, already_past, already_skipped, sequence_ended,
            or invalid_relay_id when applicable
          example: ok
        current_mode:
          type: string
          nullable: true
          enum: [manual, auto, semi_auto, pause]
        opened_relay:
          type: integer
          nullable: true
          minimum: 0
          maximum: 7
          description: Currently opened relay after the operation, if any
        skipped_relays:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 7
          example: [0, 3]

    SettingsRequest:
      type: object
      required:
        - start_at
        - sequence
        - schedule
      properties:
        start_at:
          type: string
          pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Start time in HH:MM format (24-hour)
          example: "20:00"
        sequence:
          type: array
          items:
            type: integer
            minimum: 0
          minItems: 8
          maxItems: 8
          description: Array of 8 duration values in seconds for each relay (0-7)
          example: [3600, 3600, 3600, 3600, 3600, 3600, 3600, 0]
        schedule:
          type: array
          items:
            type: boolean
          minItems: 7
          maxItems: 7
          description: Array of 7 boolean values for each day of the week (Monday=0, Sunday=6)
          example: [false, false, false, false, false, false, true]

    SettingsResponse:
      type: object
      required:
        - start_at
        - sequence
        - schedule
      properties:
        start_at:
          type: string
          pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Start time in HH:MM format (24-hour)
          example: "20:00"
        sequence:
          type: array
          items:
            type: integer
            minimum: 0
          minItems: 8
          maxItems: 8
          description: Array of 8 duration values in seconds for each relay (0-7)
          example: [3600, 3600, 3600, 3600, 3600, 3600, 3600, 0]
        schedule:
          type: array
          items:
            type: boolean
          minItems: 7
          maxItems: 7
          description: Array of 7 boolean values for each day of the week (Monday=0, Sunday=6)
          example: [false, false, false, false, false, false, true]

    SequenceStatus:
      type: object
      required:
        - opened_relay
        - opened_at
      properties:
        opened_relay:
          type: integer
          minimum: 0
          maximum: 7
          description: Currently opened relay number (0-7)
          example: 3
        opened_at:
          type: integer
          description: Unix timestamp when relay was opened
          example: 1758827415
        should_close_at:
          type: integer
          description: Unix timestamp when relay should close (only present when the relay has a non-zero duration)
          example: 1758827445
        skipped_relays:
          type: array
          description: Relay indices skipped for the remainder of this run
          items:
            type: integer
            minimum: 0
            maximum: 7
          example: [2, 5]

    ActionResponse:
      type: object
      required:
        - success
        - message
        - current_mode
      properties:
        success:
          type: boolean
          description: Whether the action was successful
          example: true
        message:
          type: string
          description: Human-readable message about the action result
          examples:
            - "System paused successfully"
            - "System resumed successfully"
            - "System reset successfully"
            - "Sequence started successfully"
        current_mode:
          type: string
          enum: [manual, auto, semi_auto, pause]
          nullable: true
          description: Current system mode after the action
          example: "pause"

    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: Error message
          example: "Invalid mode 'invalid'. Valid modes are: ['manual', 'auto', 'semi_auto', 'pause']"

    RelayOpenRequest:
      type: object
      required:
        - relay_id
      properties:
        relay_id:
          type: integer
          minimum: 0
          maximum: 7
          description: Relay identifier (0-7)
          example: 2

    RelayState:
      type: object
      required:
        - relay_id
        - is_open
      properties:
        relay_id:
          type: integer
          minimum: 0
          maximum: 7
          description: Relay identifier (0-7)
          example: 2
        is_open:
          type: boolean
          description: Whether this relay is currently open (water flowing)
          example: false

    RelayStatusResponse:
      type: object
      required:
        - success
        - message
        - current_mode
        - relays
      properties:
        success:
          type: boolean
          description: Whether the action was successful (always true for GET /relays)
          example: true
        message:
          type: string
          description: Human-readable message about the action result or status
          example: "Relay 3 opened successfully"
        current_mode:
          type: string
          enum: [manual, auto, semi_auto, pause]
          nullable: true
          description: Current system mode
          example: "manual"
        relays:
          type: array
          minItems: 8
          maxItems: 8
          items:
            $ref: '#/components/schemas/RelayState'
          description: Per-relay state for all 8 relays (0-7). At most one relay is open at a time.

    RelayActivityItem:
      type: object
      required:
        - id
        - relay_id
        - opened_at
        - duration_s
        - mode
      properties:
        id:
          type: integer
          description: Auto-incrementing row id
          example: 42
        relay_id:
          type: integer
          minimum: 0
          maximum: 7
          description: Relay identifier (0-7)
          example: 3
        opened_at:
          type: integer
          description: Unix timestamp (UTC seconds) when the relay was opened
          example: 1758827415
        duration_s:
          type: integer
          minimum: 0
          description: How long the relay stayed open, in seconds
          example: 1800
        mode:
          type: string
          enum: [auto, semi_auto, manual]
          description: System mode at the time the relay was opened
          example: "auto"

    HistoryListResponse:
      type: object
      required:
        - items
        - page
        - page_size
        - total
        - total_pages
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RelayActivityItem'
          description: History rows for the current page (newest first)
        page:
          type: integer
          minimum: 1
          example: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 500
          example: 100
        total:
          type: integer
          minimum: 0
          description: Total number of matching rows across all pages
          example: 42
        total_pages:
          type: integer
          minimum: 0
          description: Total number of pages given page_size (0 when total=0)
          example: 1

    RelayStat:
      type: object
      required:
        - relay_id
        - total_duration_s
        - count
      properties:
        relay_id:
          type: integer
          minimum: 0
          maximum: 7
          example: 3
        total_duration_s:
          type: integer
          minimum: 0
          description: Sum of duration_s for this relay in the period
          example: 5400
        count:
          type: integer
          minimum: 0
          description: Number of activities recorded for this relay in the period
          example: 2

    HistoryStatsResponse:
      type: object
      required:
        - period
        - year
        - start_at
        - end_at
        - total_duration_s
        - total_count
        - per_relay
      properties:
        period:
          type: string
          enum: [month, year]
          example: "month"
        year:
          type: integer
          minimum: 2000
          maximum: 2100
          example: 2026
        month:
          type: integer
          nullable: true
          minimum: 1
          maximum: 12
          description: Month 1-12 (null when period=year)
          example: 4
        start_at:
          type: integer
          description: Inclusive lower bound of the period (unix seconds, local tz)
          example: 1774994400
        end_at:
          type: integer
          description: Exclusive upper bound of the period (unix seconds, local tz)
          example: 1777586400
        total_duration_s:
          type: integer
          minimum: 0
          description: Sum of duration_s across all relays in the period
          example: 43200
        total_count:
          type: integer
          minimum: 0
          description: Total number of history rows in the period
          example: 24
        per_relay:
          type: array
          minItems: 8
          maxItems: 8
          items:
            $ref: '#/components/schemas/RelayStat'
          description: Per-relay breakdown, always 8 entries (relay_id 0..7), zero-filled when inactive

    InterfaceStatus:
      type: object
      required:
        - up
      properties:
        up:
          type: boolean
          description: True when the interface has a non-link-local DHCP IPv4
        ip:
          type: string
          nullable: true
          example: "192.168.1.42"

    WifiStaStatus:
      type: object
      required:
        - configured
        - up
      properties:
        configured:
          type: boolean
          description: Whether a Wi-Fi client profile is stored in NetworkManager
        ssid:
          type: string
          nullable: true
          example: "home-network"
        security:
          type: string
          nullable: true
          enum: [wpa2-psk]
          example: "wpa2-psk"
        up:
          type: boolean
          description: True when wlan0 is associated as a client (not AP) with a valid IPv4
        ip:
          type: string
          nullable: true
          example: "192.168.1.55"

    ApStatus:
      type: object
      required:
        - active
      properties:
        active:
          type: boolean
          description: True when the AP profile is currently up
        ssid:
          type: string
          nullable: true
          example: "arrosage-setup"
        since:
          type: integer
          nullable: true
          description: Unix seconds when the AP was last brought up
          example: 1774994400

    NetworkStatusResponse:
      type: object
      required:
        - mode
        - ethernet
        - wifi_sta
        - ap
      properties:
        mode:
          type: string
          nullable: true
          enum: [ethernet, wifi_sta, ap, checking]
          example: "ethernet"
        lan_last_ok_at:
          type: integer
          nullable: true
          description: Unix seconds of the last successful LAN observation
          example: 1774994400
        ethernet:
          $ref: '#/components/schemas/InterfaceStatus'
        wifi_sta:
          $ref: '#/components/schemas/WifiStaStatus'
        ap:
          $ref: '#/components/schemas/ApStatus'

    NetworkForceRequest:
      type: object
      required:
        - target
      properties:
        target:
          type: string
          enum: [ap, auto]
          description: Target state; ``auto`` releases any previous ``ap`` override
          example: "ap"

    NetworkForceResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean
        target:
          type: string
          nullable: true
          enum: [ap, auto]
          example: "ap"

    WifiProfileResponse:
      type: object
      required:
        - configured
      properties:
        configured:
          type: boolean
        ssid:
          type: string
          nullable: true
          example: "home-network"
        security:
          type: string
          nullable: true
          enum: [wpa2-psk]
          example: "wpa2-psk"

    WifiProfileRequest:
      type: object
      required:
        - ssid
        - psk
      properties:
        ssid:
          type: string
          minLength: 1
          maxLength: 32
          example: "home-network"
        security:
          type: string
          enum: [wpa2-psk]
          default: "wpa2-psk"
          example: "wpa2-psk"
        psk:
          type: string
          minLength: 8
          maxLength: 63
          example: "correct-horse-battery-staple"

tags:
  - name: Mode
    description: System mode management
  - name: Status
    description: Sequence status information
  - name: Sequence
    description: Running sequence edits (skip relay while active)
  - name: Control
    description: System control actions (pause, resume, reset, start)
  - name: Relay
    description: Manual relay control (open/close) and per-relay status
  - name: Settings
    description: System settings (start time, sequence durations, weekly schedule)
  - name: History
    description: Relay activity history (list + aggregate stats for dashboards)
  - name: Network
    description: LAN connectivity status, Wi-Fi client profile, and AP fallback
